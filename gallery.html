<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COALAB AI 동화책 전시관</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="title-wrap">
    <img src="assets/logo.png" alt="COALAB 로고" class="logo">
    <h1>COALAB AI 동화책 전시관</h1>
  </div>
  <p>AI와 함께 만들어가는 이야기의 숲</p>
</header>


  <main>
    <section id="gallery" class="gallery"></section>
  </main>

  <!-- 모달 팝업 -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <img id="modal-cover" src="" alt="책 표지">
      <h2 id="modal-title"></h2>
      <p id="modal-desc"></p>

      <a id="modal-link" href="#" class="button" aria-label="Canva로 열기">📖 Canva로 열기</a>
    </div>
  </div>

  <footer>
    <p>© 2025 COALAB Lifelong Education | AI Storybook Project</p>
  </footer>

  <script src="./css/js/main.js"></script>
  <script>
    // 은현초등학교 카드 추가 (클릭 시 eunhyun.html로 이동)
    document.addEventListener("DOMContentLoaded", () => {
      const gallery = document.getElementById("gallery");
      const eunhyunCard = document.createElement("div");
      eunhyunCard.className = "book-card";
      eunhyunCard.style.border = "2px solid #667eea";
      eunhyunCard.innerHTML =
        '<img src="images/eunhyun/01-bak/1.png" alt="은현초등학교 동화책">' +
        '<h3>🏫 은현초등학교</h3>' +
        '<p>꿈길 프로그램 · 학생 작품 11편</p>';
      eunhyunCard.addEventListener("click", () => {
        location.href = "eunhyun.html";
      });
      gallery.appendChild(eunhyunCard);
    });
  </script>
</body>
</html>
